<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TFT 裝備大師</title>
    <style>
        :root { --bg: #0d1117; --card: #1c212e; --accent: #c8aa6e; --text: #f0e6d2; --success: #2ecc71; --fail: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow-x: hidden; user-select: none; }
        
        /* 計時器 */
        .timer-container { width: 100%; max-width: 400px; height: 8px; background: #333; margin-bottom: 15px; border-radius: 4px; overflow: hidden; display: none; }
        .timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #e67e22, var(--accent)); transition: width 0.1s linear; }

        /* 模式切換 */
        .mode-switch { margin-bottom: 15px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .btn-mode { padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: var(--accent); cursor: pointer; border-radius: 5px; font-size: 0.85rem; }
        .btn-mode.active { background: var(--accent); color: var(--bg); font-weight: bold; }

        /* 題目顯示區域 */
        .target-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; width: 100%; max-width: 600px; }
        .target-box { background: var(--card); border: 2px solid var(--accent); border-radius: 10px; padding: 10px; text-align: center; transition: all 0.3s; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }
        
        .mode-classic .target-box { width: 90%; min-height: 120px; }
        .mode-challenge .target-box { width: 110px; min-height: 90px; }

        .target-box.completed { border-color: var(--success); opacity: 0.2; transform: scale(0.9); }
        .target-box.completed::after { content: "✓"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--success); font-size: 3rem; font-weight: bold; }
        
        .target-img { width: 45px; height: 45px; margin: 5px 0; border: 1px solid var(--accent); border-radius: 4px; }
        .target-name { font-weight: bold; font-size: 1rem; color: var(--accent); }
        .target-desc { font-size: 0.85rem; color: #ccc; margin-top: 6px; line-height: 1.4; padding: 0 10px; }

        /* 合成區與背包 */
        .craft-zone { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid rgba(200,170,110,0.2); }
        .slot { width: 70px; height: 70px; border: 2px dashed #555; border-radius: 10px; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); }
        .slot img { width: 100%; height: 100%; border-radius: 8px; }

        .inventory { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; min-height: 240px; width: 280px; box-shadow: inset 0 0 15px #000; }
        .base-item { width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .base-item img { width: 60px; height: 60px; border: 1px solid #444; border-radius: 4px; background: #000; }
        .item-name { font-size: 0.7rem; text-align: center; margin-top: 4px; color: #bbb; }

        /* 鐵砧選單優化 */
        #anvil-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .anvil-options { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; justify-content: center; max-width: 90vw; padding: 10px; }
        .opt-card { background: #252a3a; border: 2px solid var(--accent); padding: 12px; border-radius: 12px; cursor: pointer; text-align: center; width: 70px; transition: transform 0.2s; }
        .opt-card:active { transform: scale(0.9); }
        .opt-card img { width: 50px; height: 50px; margin-bottom: 5px; border-radius: 4px; }
        .opt-card div { font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        
        .btn-reset { margin-top: 20px; padding: 12px 30px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body onclick="playTone('silent')">

    <h2 style="color: var(--accent); margin: 5px 0; letter-spacing: 2px;">TFT 裝備大師</h2>
    
    <div class="mode-switch">
        <button id="mode-classic" class="btn-mode active" onclick="switchMode('classic')">基礎模式</button>
        <button id="mode-advanced" class="btn-mode" onclick="switchMode('advanced')">進階限時</button>
        <button id="mode-extreme" class="btn-mode" onclick="switchMode('extreme')">鐵砧挑戰</button>
    </div>

    <div class="timer-container" id="timer-container">
        <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div id="target-container" class="target-container mode-classic"></div>

    <div class="craft-zone">
        <div class="slot" id="slot0" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        <div style="font-size: 1.5rem; color: var(--accent); font-weight: bold;">+</div>
        <div class="slot" id="slot1" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>

    <div id="inventory" class="inventory" ondragover="allowDrop(event)"></div>

    <button class="btn-reset" onclick="resetGame()">換一組題目</button>

    <div id="anvil-overlay">
        <h2 style="color: var(--accent); margin: 0;">組件鐵砧</h2>
        <p style="color: #888;">選擇需要的組件</p>
        <div class="anvil-options" id="anvil-options"></div>
    </div>

<script>
    // 使用官方伺服器資源確保穩定性
    const IMG_BASE = "https://c-tft-api.op.gg/img/set/17/tft-item/";
    const ANVIL_URL = "https://raw.githubusercontent.com/r1cgrady/anvil/889f372c53f995a6954071247c9c8494a0535c4a/%E9%90%B5%E7%A0%A7.png"; 
    
    const bases = {
        "大劍": "TFT_Item_BFSword.png", "反曲弓": "TFT_Item_RecurveBow.png",
        "鎖子甲": "TFT_Item_ChainVest.png", "負極斗篷": "TFT_Item_NegatronCloak.png",
        "大棒": "TFT_Item_NeedlesslyLargeRod.png", "水滴": "TFT_Item_TearOfTheGoddess.png",
        "腰帶": "TFT_Item_GiantsBelt.png", "拳套": "TFT_Item_SparringGloves.png"
    };

    const recipes = [
        { n: "無盡之刃", c: ["大劍", "拳套"], img: "TFT_Item_InfinityEdge.png", desc: "物理輸出英雄可用，獲得精準，技能傷害可以暴擊。精準會賦予10%暴擊傷害。" },
        { n: "鬼索的狂暴之刃", c: ["反曲弓", "大棒"], img: "TFT_Item_GuinsoosRageblade.png", desc: "每秒增加7%可累加攻速。" },
        { n: "死亡之帽", c: ["大棒", "大棒"], img: "TFT_Item_RabadonsDeathcap.png", desc: "超多魔攻，但大多數情況下優先度低於法暴。" },
        { n: "精進之矛", c: ["大劍", "水滴"], img: "TFT_Item_SpearOfShojin.png", desc: "啓動裝(回魔用)，適合技能型輸出英雄，物理英雄的攻擊賦予5額外魔力。" },
        { n: "棘刺之甲", c: ["鎖子甲", "鎖子甲"], img: "TFT_Item_BrambleVest.png", desc: "很多物防，增加6%最大生命。承受的普攻傷害降低5%。被普攻命中時，對所有鄰近敵軍造成100魔法傷害。" },
        { n: "日炎斗篷", c: ["鎖子甲", "腰帶"], img: "TFT_Item_RedBuff.png", desc: "坦克用的降治療" },
        { n: "嗜血者", c: ["大劍", "負極斗篷"], img: "TFT_Item_Bloodthirster.png", desc: "鬥士用吸血，生命掉到40%時，獲得等同於25%最大生命的護盾，最多持續5秒。" },
        { n: "好戰", c: ["腰帶", "腰帶"], img: "TFT_Item_WarmogsArmor.png", desc: "很多血" },
        { n: "藍buff", c: ["水滴", "水滴"], img: "TFT_Item_BlueBuff.png", desc: "啓動裝(回魔用)，適合技能型輸出英雄，物魔攻增加。" },
        { n: "大天使", c: ["水滴", "大棒"], img: "TFT_Item_ArchangelsStaff.png", desc: "戰鬥開始時：戰鬥中每5秒獲得20%魔攻。" },
        { n: "石像鬼", c: ["鎖子甲", "負極斗篷"], img: "TFT_Item_GargoyleStoneplate.png", desc: "被越多人圍毆雙防越高。" },
        { n: "巨人殺手", c: ["大劍", "反曲弓"], img: "TFT_Item_MadredsBloodrazor.png", desc: "目標為坦克時，獲得額外15%傷害增幅。" },
        { n: "水滴甲", c: ["水滴", "鎖子甲"], img: "TFT_Item_FrozenHeart.png", desc: "戰鬥開始：獲得20魔力。生命降至40%時，獲得15魔力和等同於20%最大生命的護盾。" },
        { n: "法暴", c: ["大棒", "拳套"], img: "TFT_Item_JeweledGauntlet.png", desc: "魔攻輸出強力裝備，獲得精準，技能傷害可以暴擊。精準會賦予10%暴擊傷害" },
        { n: "偷偷", c: ["拳套", "拳套"], img: "TFT_Item_ThiefsGloves.png", desc: "給你場上沒裝備的最強英雄用。" },
        { n: "振奮", c: ["腰帶", "水滴"], img: "TFT_Item_Redemption.png", desc: "每秒回復2%已損失生命。" },
        { n: "夜色", c: ["鎖子甲", "大劍"], img: "TFT_Item_GuardianAngel.png", desc: "生命降至60%時，短暫進入無法被指定狀態，移除負面效果，並回復30%已損失生命。" },
        { n: "納什", c: ["反曲弓", "腰帶"], img: "TFT_Item_Leviathan.png", desc: "普攻回復2額外魔力；暴擊則提升至4額外魔力。" },
        { n: "均等", c: ["腰帶", "負極斗篷"], img: "TFT_Item_SpectralGauntlet.png", desc: "在2格內的敵軍受到30%破甲(降低物防)。戰鬥開始後15秒內，增加自己15物理防禦&魔法防禦。" },
        { n: "耳語", c: ["反曲弓", "拳套"], img: "TFT_Item_LastWhisper.png", desc: "物理輸出英雄用的破防。普攻和技能傷害對目標造成30%破甲(降低物防)，持續3秒。此效果無法累加。" },
        { n: "破防者(打手連枷)", c: ["腰帶", "拳套"], img: "TFT_Item_PowerGauntlet.png", desc: "暴擊賦予5%傷害增幅，持續5秒，最多疊加4層(不要)。" },
        { n: "手套", c: ["大劍", "腰帶"], img: "TFT_Item_SteraksGage.png", desc: "物理鬥士用，生命降低到60%時，獲得等同於40%裝備者最大生命的護盾。護盾會在4秒內快速衰減。" },
        { n: "皇冠", c: ["大棒", "鎖子甲"], img: "TFT_Item_Crownguard.png", desc: "戰鬥開始時：獲得等同於25%最大生命的護盾，持續8秒。護盾消失時，增加25%魔攻。" },
        { n: "死神", c: ["大劍", "大劍"], img: "TFT_Item_Deathblade.png", desc: "裝備者擊殺或參與擊殺敵人時，剩餘戰鬥期間獲得額外物理傷害。這個效果可以疊加無限次" },
        { n: "適性", c: ["水滴", "負極斗篷"], img: "TFT_Item_AdaptiveHelm.png", desc: "增加回魔，坦克和鬥士英雄可獲得30雙防。其他英雄可增加10%物攻 and 魔攻。" },
        { n: "水銀", c: ["拳套", "負極斗篷"], img: "TFT_Item_Quicksilver.png", desc: "戰鬥開始：免疫控場效果，持續18秒。每秒增加3%可累加攻速。" },
        { n: "正義", c: ["水滴", "拳套"], img: "TFT_Item_UnstableConcoction.png", desc: "鬥士用加攻擊&吸血" },
        { n: "虛空", c: ["水滴", "反曲弓"], img: "TFT_Item_StatikkShiv.png", desc: "法師用的破魔防，普攻和技能傷害對目標造成30%削抗(降低魔防)，持續5秒。此效果無法累加。" },
        { n: "泰坦", c: ["反曲弓", "鎖子甲"], img: "TFT_Item_TitansResolve.png", desc: "鬥士用，普攻或承受傷害時，獲得2%物攻與2%魔攻，最多累加25層。滿層時，獲得10%傷害增幅，並免疫控場效果。" },
        { n: "黑書", c: ["腰帶", "大棒"], img: "TFT_Item_Morellonomicon.png", desc: "AOE法師用，普攻和技能對敵軍造成1%燃燒及33%重創，持續10秒。" },
        { n: "龍爪", c: ["負極斗篷", "負極斗篷"], img: "TFT_Item_DragonsClaw.png", desc: "很多的魔防。增加6%最大生命。每2秒回復2.5%最大生命。" },
        { n: "海妖", c: ["反曲弓", "負極斗篷"], img: "TFT_Item_RunaansHurricane.png", desc: "物理攻速英雄用，普攻可增加3.5%可累加的物攻，最多累加15層；達到15層時，增加15%攻速。" },
        { n: "槍刀", c: ["大劍", "大棒"], img: "TFT_Item_HextechGunblade.png", desc: "造成傷害的20%可治療生命比例最低的友軍" },
        { n: "紅buff", c: ["反曲弓", "反曲弓"], img: "TFT_Item_RapidFireCannon.png", desc: "攻速英雄用的降治療，普攻與技能會對敵軍造成1%燃燒與33%重創，持續5秒。" },
        { n: "堅定之心", c: ["拳套", "鎖子甲"], img: "TFT_Item_NightHarvester.png", desc: "獲得5%續戰力(減傷)。自己生命高於50%時，改為獲得15%續戰力(減傷)。" },
        { n: "星火", c: ["負極斗篷", "大棒"], img: "TFT_Item_IonicSpark.png", desc: "坦克用的破魔防，2格內的敵軍受到30%削抗(降低魔防)。敵軍施放技能時，造成敵軍消耗魔力150%的魔法傷害。" }
    ];

    let gameMode = "classic", currentTargets = [], selected = [null, null], selectedIndices = [null, null], invItems = [], audioCtx = null;
    let timerInterval = null, timeLeft = 100, missingKeyComponent = null;

    function playTone(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'pick') { osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'success') { osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
            else if (type === 'fail') { osc.frequency.setValueAtTime(120, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
            else if (type === 'return') { osc.frequency.setValueAtTime(400, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
        } catch(e) {}
    }

    function switchMode(mode) { gameMode = mode; resetGame(); }

    function startTimer() {
        clearInterval(timerInterval);
        const container = document.getElementById('timer-container');
        if (gameMode === "classic") { container.style.display = 'none'; return; }
        container.style.display = 'block'; timeLeft = 100;
        let speed = gameMode === "extreme" ? (100 / 110) : (100 / 80); 
        timerInterval = setInterval(() => {
            timeLeft -= speed;
            document.getElementById('timer-bar').style.width = timeLeft + "%";
            if (timeLeft <= 0) { clearInterval(timerInterval); playTone('fail'); resetGame(); }
        }, 100);
    }

    function resetGame() {
        clearInterval(timerInterval);
        const targetContainer = document.getElementById('target-container');
        targetContainer.innerHTML = "";
        targetContainer.className = gameMode === 'classic' ? "target-container mode-classic" : "target-container mode-challenge";
        document.getElementById('anvil-overlay').style.display = 'none';
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.toggle('active', b.id === 'mode-'+gameMode));
        clearSlotsDirect();
        
        let count = (gameMode === "advanced" || gameMode === "extreme") ? 3 : 1;
        currentTargets = [...recipes].sort(() => 0.5 - Math.random()).slice(0, count).map(t => ({...t, completed: false}));

        if (gameMode === "extreme") {
            let allNeeded = [];
            currentTargets.forEach(t => allNeeded.push(...t.c));
            const isHighRoll = Math.random() > 0.5;
            if (!isHighRoll) {
                const missingIdx = Math.floor(Math.random() * allNeeded.length);
                missingKeyComponent = allNeeded.splice(missingIdx, 1)[0];
            } else { missingKeyComponent = null; }
            invItems = [...allNeeded, "ANVIL"];
            while(invItems.length < 9) {
                const baseNames = Object.keys(bases);
                const r = baseNames[Math.floor(Math.random() * 8)];
                if (r !== missingKeyComponent) invItems.push(r);
            }
        } else if (gameMode === "advanced") {
            invItems = [];
            currentTargets.forEach(t => invItems.push(...t.c));
            while(invItems.length < 9) invItems.push(Object.keys(bases)[Math.floor(Math.random()*8)]);
        } else {
            invItems = Object.keys(bases).sort(() => 0.5 - Math.random());
        }
        
        invItems.sort(() => 0.5 - Math.random());
        
        currentTargets.forEach(t => {
            const div = document.createElement('div'); div.className = 'target-box'; div.id = 't-'+t.n;
            let html = `<div class="target-name">${t.n}</div><img class="target-img" src="${IMG_BASE+t.img}">`;
            if (gameMode === 'classic') {
                html += `<div class="target-desc">${t.desc}</div>`;
            }
            div.innerHTML = html;
            targetContainer.appendChild(div);
        });
        renderInventory();
        startTimer();
    }

    function renderInventory() {
        const inv = document.getElementById('inventory'); inv.innerHTML = "";
        invItems.forEach((name, idx) => {
            const wrap = document.createElement('div'); wrap.className = 'base-item';
            if (name === "ANVIL") {
                wrap.innerHTML = `<img src="${ANVIL_URL}"><div class="item-name">鐵砧</div>`;
                wrap.onclick = openAnvil;
            } else if (name) {
                wrap.draggable = true;
                wrap.innerHTML = `<img src="${IMG_BASE+bases[name]}"><div class="item-name">${name}</div>`;
                wrap.id = `inv-${idx}`;
                wrap.ondragstart = (e) => { 
                    e.dataTransfer.setData("n", name); e.dataTransfer.setData("i", idx);
                    playTone('pick'); wrap.classList.add('dragging');
                };
                wrap.ondragend = (e) => { wrap.classList.remove('dragging'); renderInventory(); };
            } else { wrap.style.visibility = 'hidden'; }
            inv.appendChild(wrap);
        });
    }

    function openAnvil() {
        playTone('pick');
        const overlay = document.getElementById('anvil-overlay'), optionsDiv = document.getElementById('anvil-options');
        overlay.style.display = 'flex'; optionsDiv.innerHTML = "";
        let optionSet = new Set();
        if (missingKeyComponent) optionSet.add(missingKeyComponent);
        while(optionSet.size < 4) optionSet.add(Object.keys(bases)[Math.floor(Math.random() * 8)]);
        Array.from(optionSet).sort(() => 0.5 - Math.random()).forEach(opt => {
            const card = document.createElement('div'); card.className = 'opt-card';
            card.innerHTML = `<img src="${IMG_BASE+bases[opt]}"><div>${opt}</div>`;
            card.onclick = () => { 
                const anvilIdx = invItems.indexOf("ANVIL");
                if(anvilIdx !== -1) invItems[anvilIdx] = opt; 
                overlay.style.display = 'none'; playTone('success'); renderInventory(); 
            };
            optionsDiv.appendChild(card);
        });
    }

    // ... 前面代碼保持不變 ...

    function drop(e) {
        e.preventDefault(); 
        const slot = e.target.closest('.slot'); if (!slot) return;
        const name = e.dataTransfer.getData("n"), idx = parseInt(e.dataTransfer.getData("i")), sIdx = slot.id === 'slot0' ? 0 : 1;
        
        // 如果該 Slot 已經有東西，先退回背包
        if (selected[sIdx]) { 
            returnItemToInventory(sIdx);
        }

        // 放入新組件
        if (gameMode !== "classic") invItems[idx] = null;
        selected[sIdx] = name; 
        selectedIndices[sIdx] = idx;
        
        // 渲染 Slot 內容並加入「點擊退回」的事件
        slot.innerHTML = `<img src="${IMG_BASE+bases[name]}" onclick="returnItemToInventory(${sIdx})">`; 
        playTone('pick');

        if (selected[0] && selected[1]) setTimeout(check, 180);
        else renderInventory();
    }

    // 新增：退回組件的函數
    function returnItemToInventory(sIdx) {
        if (!selected[sIdx]) return;
        
        // 如果不是基礎模式，要把組件放回背包原本的位置
        if (gameMode !== "classic") {
            invItems[selectedIndices[sIdx]] = selected[sIdx];
        }
        
        // 清空該 Slot 數據與外觀
        selected[sIdx] = null;
        selectedIndices[sIdx] = null;
        document.getElementById('slot' + sIdx).innerHTML = "";
        
        playTone('return');
        renderInventory();
    }

// ... 後面 check 與 reset 等函數保持不變 ...
    function check() {
        const cur = [...selected].sort().join();
        let mIdx = currentTargets.findIndex(t => !t.completed && [...t.c].sort().join() === cur);
        if (mIdx !== -1) {
            playTone('success'); currentTargets[mIdx].completed = true;
            document.getElementById('t-'+currentTargets[mIdx].n).classList.add('completed');
            clearSlotsDirect(); renderInventory();
            if (currentTargets.every(t => t.completed)) { clearInterval(timerInterval); setTimeout(resetGame, 800); }
        } else {
            playTone('fail'); 
            setTimeout(() => {
                if (gameMode !== "classic") {
                    if(selected[0]) invItems[selectedIndices[0]] = selected[0];
                    if(selected[1]) invItems[selectedIndices[1]] = selected[1];
                }
                clearSlotsDirect(); renderInventory(); playTone('return');
            }, 300);
        }
    }

    function allowDrop(e) { e.preventDefault(); }
    function clearSlotsDirect() {
        selected = [null, null]; selectedIndices = [null, null];
        document.getElementById('slot0').innerHTML = ""; document.getElementById('slot1').innerHTML = "";
    }
    resetGame();
</script>
</body>
</html>
